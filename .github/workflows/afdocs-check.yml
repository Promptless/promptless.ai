name: Agent-Friendly Docs Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'astro.config.mjs'
      - 'package.json'

jobs:
  afdocs-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview &
          echo $! > .preview-pid

      - name: Wait for server to be ready
        run: |
          echo "Waiting for preview server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:4321 > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run afdocs check
        id: afdocs
        run: |
          echo "Checking local preview: http://localhost:4321"

          # Use root URL - /docs is a redirect and won't work
          # Use --canonical-origin to rewrite llms.txt production URLs to localhost
          # (llms.txt contains https://promptless.ai links which would be cross-origin)
          set +e
          OUTPUT=$(npx -y afdocs@latest check "http://localhost:4321" --format json --score --canonical-origin https://promptless.ai)
          EXIT_CODE=$?
          set -e

          echo "afdocs output:"
          printf '%s\n' "$OUTPUT"

          SCORE=$(printf '%s' "$OUTPUT" | jq -r '.scoring.overall // empty')

          if [ -z "$SCORE" ]; then
            echo "::error::Could not parse afdocs score from output"
            echo "Raw output for debugging:"
            echo "$OUTPUT" | head -100
            exit 1
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "Agent-Friendly Docs Score: $SCORE"

          if [ "$SCORE" -lt 100 ]; then
            echo "::error::Agent-Friendly Docs score is $SCORE, expected 100"
            exit 1
          fi

          echo "Agent-Friendly Docs check passed with score $SCORE"

      - name: Stop preview server
        if: always()
        run: |
          if [ -f .preview-pid ]; then
            kill $(cat .preview-pid) 2>/dev/null || true
          fi
