name: Annotate PostHog on deploy

on:
  push:
    branches:
      - main

jobs:
  annotate:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create PostHog annotation
        run: |
          curl -sf -X POST "https://us.posthog.com/api/projects/${{ secrets.POSTHOG_PROJECT_ID }}/annotations/" \
            -H "Authorization: Bearer ${{ secrets.POSTHOG_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg content "Website deploy: $(git log -1 --format=%s)" \
              --arg date_marker "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{content: $content, date_marker: $date_marker, scope: "project"}')"
