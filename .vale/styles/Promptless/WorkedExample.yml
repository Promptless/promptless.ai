# Prefer "example" over "worked example".
#
# "Worked example" is banned house terminology — it reads as academic jargon
# where a plain "example" (or "end-to-end example") does the job. This is a
# lexical preference, so it runs as a substitution that flags the phrase and
# suggests the plainer form. The match is case-insensitive and covers the
# noun-phrase variants that carry the same jargon ("worked example",
# "worked instance"); the possessive "worked example's" is caught by the
# "worked example" key since the substitution matches the phrase within the
# word. Keep this in sync with the sitewide rule against "worked example".
extends: substitution
message: "Don't use 'worked example'; use '%s' (or 'end-to-end example') instead."
level: error
ignorecase: true
# `swap` maps each flagged phrase to its plainer equivalent so the suggestion
# reads naturally in place.
swap:
  worked examples: examples
  worked example: example
  worked instances: examples
  worked instance: example
