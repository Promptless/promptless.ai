# Prefer "limit" over "bound" for describing scoped or restricted access.
#
# "Bound" reads as jargon in access/permissions and scoping prose; "limit"
# (and its forms) is the plainer, house term. This is a lexical preference,
# so it runs as a substitution that flags each "bound" form and suggests the
# matching "limit" form. Word phrases like "boundary" are unaffected — the
# substitution check matches whole words only, so "boundary", "inbound", and
# "outbound" are left alone.
extends: substitution
message: "Prefer a 'limit' form here; use '%s' instead."
level: warning
ignorecase: true
# `swap` maps each flagged form to its "limit" equivalent so the suggestion
# reads naturally in place. Keep verb/noun forms grammatical: bound → limit,
# bounds → limits, bounded → limited.
swap:
  bounded: limited
  bounds: limits
  bound: limit
