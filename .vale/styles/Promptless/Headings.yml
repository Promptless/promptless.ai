# Enforce sentence-style capitalization for headings.
#
# Capitalize only the first word of a heading and any proper nouns, product
# names, or acronyms. Everything else is lowercase.
#
# `exceptions` is an extensible allowlist of tokens and phrases that keep their
# own casing wherever they appear in a heading. Add new product names, brands,
# and acronyms here as the docs grow so remediation never forces them to
# lowercase. Multi-word product names are listed as phrases so their generic
# words (for example, "Teams" or "Base") are only preserved as part of the
# name, not on their own.
extends: capitalization
message: "Heading '%s' should use sentence-style capitalization: capitalize only the first word and any proper nouns, product names, or acronyms."
level: error
scope:
  - heading
  - text.frontmatter.title
# $sentence matches sentence-style casing (first word capitalized, the rest
# lowercase unless listed as an exception).
match: $sentence
# A colon starts a new clause, so the word after it may be capitalized.
indicators:
  - ':'
exceptions:
  # Promptless product, features, and surfaces
  - Promptless
  - Doc Detective
  - Deep Analysis
  - Voice Match
  - Promptless Capture
  - Screenshot Editor
  - Agent Knowledge Base
  - Knowledge Base
  # Integrations, platforms, and vendors
