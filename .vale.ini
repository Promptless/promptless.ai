StylesPath = .vale/styles
MinAlertLevel = suggestion

[formats]
mdx = md

# Sentence-case headings are a documentation-content convention. Scope the
# rule to the Starlight docs pages; blog, changelog, and marketing pages keep
# their own title-case conventions.
#
# Frontmatter coverage: Vale exposes each top-level frontmatter key as a
# `text.frontmatter.<key>` scope. The Headings rule scopes to `heading` plus
# `text.frontmatter.title`, so the page `title` — which Starlight renders as
# the H1 — is held to the same sentence-case rule as in-body headings. The
# `description` key is prose, so the heading rule deliberately does not scope to
# it; it is treated as a paragraph and left to paragraph/text-level rules (the
# Promptless style currently defines none, so `description` is free prose). The
# nested `sidebar.label` key cannot be individually scoped — Vale's frontmatter
# scoping only exposes top-level keys — so it is not linted; `title` already
# governs the H1 casing that drives the nav label for pages without an override.
[src/content/docs/**/*.{md,mdx}]
BasedOnStyles = Promptless
